name: PyInstaller Windows one dir release

on:
  workflow_dispatch:

jobs:
  pyinstaller-build:
    runs-on: windows-latest
    steps:
      - name: Checkout app-builders-pyinstaller
        uses: actions/checkout@v5

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "latest"

      - name: Setup Python version
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: |
          echo "Install OS dependencies"
          choco install espeak-ng
          refreshenv
          #echo "Creating python Virtual environment... "
          #python -m venv .venv 
          #.venv\Scripts\activate
          echo "Update pip"
          python -m pip install --upgrade pip
          echo "Install Python requirements... "
          pip install -r requirements.txt

      - name: Build Extensions and run PyInstaller one dir
        run: |
          echo "Build Aeneas C extensions... "
          python setup.py build_ext --inplace

          echo "Create PyInstaller one directory executable"
          pyinstaller pyinstaller-onedir.spec --clean

      #- name: Tar build # It appears that windows has a tar command
      # run: |
      #   cd dist
      #   tar -cvf aeneas-cli.win.tar aeneas-cli

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeneas-cli.win.tar
          path: dist/aeneas-cli.win.tar
